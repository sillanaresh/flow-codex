<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gradient coords match the wordmark's waveGradient exactly so the
         w renders with the identical green → teal → blue spectrum.
         userSpaceOnUse is interpreted in the path's local coord system
         (the one set up by the inner translate/scale group), so these
         values are in original path coords, not 64×64 viewBox coords. -->
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="9710" y1="0" x2="13250" y2="0">
      <stop offset="0%"   stop-color="#0AEAA8"/>
      <stop offset="55%"  stop-color="#0ADCCE"/>
      <stop offset="100%" stop-color="#198FFF"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="#0B0D10"/>

