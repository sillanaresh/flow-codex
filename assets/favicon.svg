       Outer transform places the wordmark's w-bbox (x=971..1325, y=384..551
       in original viewBox space) into x=4..60, y≈18.9..45.1 of the 64×64. -->
  <g transform="translate(-149.4 -41.85) scale(0.158)">
    <g transform="translate(0 901) scale(0.1 -0.1)">
